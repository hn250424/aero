<style>
	:host {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
	}

	#overlay {
		position: relative;
		width: 100%;
		height: 100%;
	}

	#container {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);

		min-width: 300px;
		min-height: 200px;

		display: grid;
		grid-template-rows: 1fr 4fr;
		grid-template-columns: 1fr;
	}

	#head {
		display: grid;
		place-items: center;
		font-weight: bold;
	}

	#body {
		display: grid;
		grid-template-rows: 1fr auto;
		grid-template-columns: 1fr;

		place-items: center;
	}

	#button-box {
		padding: 10px;
	}

	button {
		min-width: 70px;
		min-height: 30px;
		border: none;
	}

	button:hover {
		cursor: pointer;
		filter: brightness(0.9);
	}

	button:active {
		scale: 0.99;
	}
</style>

<div id="overlay">
	<div id="container">
		<div id="head">
			<span id="title"></span>
		</div>
		<div id="body">
			<span id="message"></span>
			<div id="button-box">
				<button id="ok">ok</button>
			</div>
		</div>
	</div>
</div>
